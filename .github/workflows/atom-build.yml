name: AtomJS CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run verify:electron
      - name: Build and verify native macOS app
        if: runner.os == 'macOS'
        run: |
          node packages/cli/bin/atom.cjs build macos --local --project tests/fixtures/macos-smoke
          test -x "tests/fixtures/macos-smoke/build/macos/AtomJS Smoke.app/Contents/MacOS/AtomJS Smoke"
          test -x "tests/fixtures/macos-smoke/build/macos/AtomJS Smoke.app/Contents/MacOS/AtomJSWindowHost"
          test ! -d "tests/fixtures/macos-smoke/build/macos/AtomJS Smoke.app/Contents/Resources/app"
          test ! -e "tests/fixtures/macos-smoke/build/macos/AtomJS Smoke.app/Contents/Resources/runtime/node"
          codesign --verify --deep --strict "tests/fixtures/macos-smoke/build/macos/AtomJS Smoke.app"

  package-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run pack:dry
